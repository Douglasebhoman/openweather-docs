site_name: OpenWeather API Documentation
site_url: https://douglasebhoman.com/openweather-docs/
site_author: Douglas Ebhoman
site_description: A practical getting started guide for the OpenWeather REST API — written for anyone, not just developers.

repo_name: Douglasebhoman/openweather-docs
repo_url: https://github.com/Douglasebhoman/openweather-docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables
