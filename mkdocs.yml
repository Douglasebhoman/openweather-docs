site_name: OpenWeather API Documentation
site_url: https://douglasebhoman.com/openweather-docs/
site_author: Douglas Ebhoman
site_description: A practical getting started guide for the OpenWeather REST API — written for anyone, not just developers.

repo_name: Douglasebhoman/openweather-docs
repo_url: https://github.com/Douglasebhoman/openweather-docs

theme:
  name: material
  logo: assets/logo.svg
  homepage: https://douglasebhoman.com
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: false
    code: false
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Prerequisites: prerequisites.md
  - Authentication: authentication.md
  - Endpoints: endpoints.md
  - Reading the Response: response.md
  - Error Handling: errors.md
  - Troubleshooting: troubleshooting.md
  - Quick Reference: quickreference.md

extra_css:
  - stylesheets/brand.css

extra:
  social:
    - icon: fontawesome/solid/house
      link: https://douglasebhoman.com
      name: douglasebhoman.com

copyright: '© 2026 Douglas Ebhoman · <a href="https://douglasebhoman.com">douglasebhoman.com</a>'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - tables